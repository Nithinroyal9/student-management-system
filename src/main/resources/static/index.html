<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Manager Pro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #f0f2f5; padding-top: 40px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .table-container { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .btn-edit { background-color: #ffc107; border: none; color: #000; font-weight: 600; }
        .btn-delete { background-color: #dc3545; border: none; color: white; font-weight: 600; }
        .form-label { font-weight: 600; color: #495057; }
        .search-group { box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-radius: 8px; overflow: hidden; }

        /* Message Alert Styling */
        #inlineMessage { font-weight: 600; border-radius: 8px; transition: all 0.3s ease; }
    </style>
</head>
<body>

<div class="container">
    <div class="row g-4">

        <div class="col-lg-4">
            <div class="card p-4">
                <h3 id="formTitle" class="mb-4 fw-bold text-primary">Add Student</h3>

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="name" class="form-control form-control-lg" placeholder="Min. 2 characters">
                </div>

                <div class="mb-4">
                    <label class="form-label">Department</label>
                    <input type="text" id="dept" class="form-control form-control-lg" placeholder="e.g. Full Stack">
                </div>

                <button id="submitBtn" class="btn btn-success btn-lg w-100 fw-bold shadow-sm" onclick="handleAction()">
                    Add to Database
                </button>

                <button id="cancelBtn" class="btn btn-light w-100 mt-2 border" onclick="resetForm()" style="display: none;">
                    Cancel Update
                </button>

                <div id="inlineMessage" class="mt-3 text-center alert d-none"></div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="table-container">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="fw-bold m-0 text-dark">Registered Students</h3>
                    <button class="btn btn-outline-primary btn-sm rounded-pill px-3" onclick="showStudents()">
                        🔄 Refresh
                    </button>
                </div>

                <div class="input-group search-group mb-4">
                    <span class="input-group-text bg-white border-end-0">🔍</span>
                    <input type="text" id="searchInput" class="form-control border-start-0" placeholder="Search by name..." onkeyup="searchByName()">
                    <button class="btn btn-outline-secondary" onclick="clearSearch()">Clear</button>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Dept</th>
                            <th class="text-center">Actions</th>
                        </tr>
                        </thead>
                        <tbody id="studentTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    let isEditMode = false;
    let editId = null;

    // --- ALERT FUNCTION (Now Inline under button) ---
    function showAlert(message, typeClass) {
        const msgDiv = document.getElementById('inlineMessage');
        msgDiv.innerText = message;
        msgDiv.className = `mt-3 text-center alert ${typeClass}`;
        msgDiv.classList.remove('d-none');

        // Hide after 4 seconds automatically
        setTimeout(() => {
            msgDiv.classList.add('d-none');
        }, 4000);
    }

    // --- MAIN ACTION (ADD/UPDATE) ---
    async function handleAction() {
        const name = document.getElementById('name').value.trim();
        const dept = document.getElementById('dept').value.trim();

        // Validation Logic
        if (name.length < 2) {
            showAlert("⚠️ Name must be at least 2 characters!", "alert-warning text-dark");
            return;
        }
        if (dept === "") {
            showAlert("⚠️ Department is required!", "alert-warning text-dark");
            return;
        }

        const url = isEditMode ? `http://localhost:8080/students/${editId}` : 'http://localhost:8080/students';
        const method = isEditMode ? 'PUT' : 'POST';

        try {
            const response = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, department: dept })
            });

            if (response.ok) {
                showAlert(isEditMode ? "✅ Successfully Updated!" : "✅ Successfully Added!", "alert-success");
                resetForm();
                showStudents();
            } else {
                showAlert("❌ Error: Invalid data provided", "alert-danger");
            }
        } catch (e) {
            showAlert("🚫 Error: Server is not responding", "alert-danger");
        }
    }

    // --- FETCH DATA ---
    async function showStudents() {
        try {
            const response = await fetch('http://localhost:8080/students');
            const students = await response.json();
            renderTable(students);
        } catch (e) {
            console.error("Fetch failed", e);
        }
    }

    // --- SEARCH LOGIC ---
    async function searchByName() {
        const q = document.getElementById('searchInput').value;
        if (q === "") return showStudents();
        const response = await fetch(`http://localhost:8080/students/search?name=${q}`);
        renderTable(await response.json());
    }

    function clearSearch() {
        document.getElementById('searchInput').value = "";
        showStudents();
    }

    // --- RENDER TABLE ---
    function renderTable(students) {
        const tbody = document.getElementById('studentTableBody');
        tbody.innerHTML = "";
        students.forEach(s => {
            tbody.innerHTML += `
                <tr>
                    <td><span class="badge bg-light text-dark border">${s.id}</span></td>
                    <td class="fw-bold">${s.name}</td>
                    <td class="text-muted">${s.department}</td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-edit px-3 me-1" onclick="prepareUpdate(${s.id}, '${s.name}', '${s.department}')">Edit</button>
                        <button class="btn btn-sm btn-delete px-3" onclick="deleteStudent(${s.id})">Delete</button>
                    </td>
                </tr>`;
        });
    }

    // --- DELETE ---
    async function deleteStudent(id) {
        if (confirm("Delete this student from the database?")) {
            const response = await fetch(`http://localhost:8080/students/${id}`, { method: 'DELETE' });
            if (response.ok) {
                showAlert("🗑️ Student Deleted!", "alert-danger");
                showStudents();
            }
        }
    }

    // --- EDIT MODE ---
    function prepareUpdate(id, name, dept) {
        document.getElementById('name').value = name;
        document.getElementById('dept').value = dept;
        document.getElementById('formTitle').innerText = "Update Student";

        const btn = document.getElementById('submitBtn');
        btn.innerText = "Save Changes";
        btn.className = "btn btn-primary btn-lg w-100 fw-bold shadow-sm";

        document.getElementById('cancelBtn').style.display = "block";
        isEditMode = true;
        editId = id;

        // Scroll to top of form smoothly
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetForm() {
        document.getElementById('name').value = '';
        document.getElementById('dept').value = '';
        document.getElementById('formTitle').innerText = "Add Student";

        const btn = document.getElementById('submitBtn');
        btn.innerText = "Add to Database";
        btn.className = "btn btn-success btn-lg w-100 fw-bold shadow-sm";

        document.getElementById('cancelBtn').style.display = "none";
        isEditMode = false;
        editId = null;
    }

    window.onload = showStudents;
</script>

</body>
</html>
