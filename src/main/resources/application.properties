spring.application.name=studentapp

# =========================================================
# 1. Database Connection (Cloud-Native Setup)
# Format: ${VARIABLE_NAME:DEFAULT_VALUE}
# =========================================================

# If DB_URL exists (Render), use it. Otherwise, use localhost.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/student_db}

# If DB_USERNAME exists (Render), use it. Otherwise, use root.
spring.datasource.username=${DB_USERNAME:root}

# If DB_PASSWORD exists (Render), use it. Otherwise, use Nithin.
spring.datasource.password=${DB_PASSWORD:Nithin}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================================
# 2. Hibernate & JPA Settings
# =========================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# This fixes a common warning on Render/Heroku
spring.jpa.open-in-view=false

# =========================================================
# 3. Server Configuration
# =========================================================
# Render automatically sets its own port, but we keep this for local testing
server.port=8080